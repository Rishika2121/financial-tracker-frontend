<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Shunyatax</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo-container">
    <img src="logo-img.jpg" alt="Shunyatax Logo" class="logo-img">
    <span class="logo-text">Shunyatax Financial Tools</span>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="deductions.html">Key Tax Deductions</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- CONTACT SECTION -->
<section class="section">

  <div class="section-title-center">
    <h1>Contact <span>Us</span></h1>
    <p class="section-sub">
      Have questions about tax deductions or compliance?
      Our team is here to assist you.
    </p>
  </div>

  <div class="contact-container">

    <form class="contact-form">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter your mobile number" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Your Query</label>
        <textarea rows="5" placeholder="Write your query here..." required></textarea>
      </div>

      <button type="submit" class="gold-btn">Submit Query</button>

    </form>

  </div>

</section>

<footer class="footer">
  <p>© 2025 Shunyatax Financial Tools | All Rights Reserved</p>
</footer>



</body>
</html>
