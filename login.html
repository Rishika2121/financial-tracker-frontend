<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Shunyatax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- REUSE MAIN THEME -->
  <link rel="stylesheet" href="access.css" />

  <!-- LOGIN-ONLY STYLES -->
  <style>
    body {
      background: #0b0f19;
      font-family: "Segoe UI", sans-serif;
      color: #eaeaf0;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      max-width: 420px;
      width: 100%;
      padding: 30px;
    }

    /* FORM CARD */
    form.cap-card {
      padding: 28px;
    }

    /* FORM GROUP */
    .form-group {
      text-align: left;              /* ✅ LEFT ALIGN */
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #d4af37;
    }

    .form-group input {
      background: #0b0b0b;
      border: 1px solid #2a2a2a;
      color: #f5f5f5;
      padding: 14px 16px;
      border-radius: 10px;
      width: 100%;
      font-size: 14px;
    }

    .form-group input::placeholder {
      color: #7a7a7a;
    }

    .form-group input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.15);
    }

    /* UNIQUE LOGIN BUTTON */
    .login-btn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37, #f1d16a);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(212, 175, 55, 0.4);
      transition: box-shadow 0.25s ease, transform 0.2s ease;
    }

    .login-btn:hover {
      box-shadow: 0 16px 40px rgba(212, 175, 55, 0.55);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* HELPER LINKS */
    .helper-links {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.9;
    }

    .helper-links a {
      color: #d4af37;
      text-decoration: none;
    }

    .helper-links a:hover {
      text-decoration: underline;
    }

    .disclaimer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="login-wrapper">
  <div class="login-box">

    <h1 style="text-align:center;">
      <span style="color:#d4af37;">Shunyatax</span> Login
    </h1>

    <p class="subtitle" style="text-align:center;">
      Secure access to your tax intelligence workspace
    </p>

    <!-- LOGIN FORM -->
    <form class="cap-card" onsubmit="loginUser(event)">

      <div class="form-group">
        <label>Email ID</label>
        <input type="email" placeholder="Enter registered email address" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">
        Login →
      </button>

    </form>

    <div class="helper-links">
      <p>
        Don’t have an account?
        <a href="signup.html">Create one</a>
      </p>
      <p>
        <a href="#">Forgot password?</a>
      </p>
    </div>

    <p class="disclaimer">
      Access is protected using secure authentication mechanisms.
    </p>

  </div>
</div>

<script>
function loginUser(e) {
  e.preventDefault();
  alert("Login request submitted. Authentication in progress.");

  // READY FOR BACKEND
  // const email = e.target.querySelector('input[type="email"]').value;
  // const password = e.target.querySelector('input[type="password"]').value;
}
</script>

</body>
</html>
